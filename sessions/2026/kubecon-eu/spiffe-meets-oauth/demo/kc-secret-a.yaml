apiVersion: v1
kind: Secret
metadata:
  name: kc-introspect-a
  namespace: workload
type: Opaque
stringData:
  KC_INTROSPECT_URL: "http://KC_A_HOST/realms/realm-a/protocol/openid-connect/token/introspect"
  KC_TOKEN_URL: "http://KC_A_HOST/realms/realm-a/protocol/openid-connect/token"
  KC_CLIENT_ID: "spiffe://td1.example/ns/workload/sa/default/app/api-server-a"
  KC_CLIENT_SECRET: ""
  CLIENT_AUTH_METHOD: "client_secret_post" # client_secret_post or spiffe
  SPIFFE_ENDPOINT_SOCKET: "unix:/run/spire/agent-sockets/spire-agent.sock"
---
apiVersion: v1
kind: Secret
metadata:
  name: kc-broker-a
  namespace: workload
type: Opaque
stringData:
  KC_A_TOKEN_URL: "http://KC_A_HOST/realms/realm-a/protocol/openid-connect/token"
  KC_A_SCOPE: "api-b"
  KC_CLIENT_ID_FOR_A: "spiffe://td1.example/ns/workload/sa/default/app/api-server-a"
  KC_CLIENT_SECRET_FOR_A: ""
  CLIENT_AUTH_METHOD_FOR_A: "client_secret_post" # client_secret_post or spiffe
  KC_B_TOKEN_URL: "http://KC_B_HOST/realms/realm-b/protocol/openid-connect/token"
  KC_CLIENT_ID_FOR_B: "spiffe://td1.example/ns/workload/sa/default/app/api-server-a"
  KC_CLIENT_SECRET_FOR_B: ""
  CLIENT_AUTH_METHOD_FOR_B: "client_secret_post" # client_secret_post or spiffe
  SPIFFE_ENDPOINT_SOCKET: "unix:/run/spire/agent-sockets/spire-agent.sock"
