apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: ${{values.k8sResource.name}}
  labels:
    app: app
spec:
  parentRefs:
    - name: shared-gateway
      namespace: shared-gateway
      sectionName: ${{values.k8sResource.namespace}}
  hostnames:
    - replace-me.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ${{values.k8sResource.name}}
          port: 80
